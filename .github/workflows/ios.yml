name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Update iOS Info.plist
        env:
          PRODUCT_BUNDLE_IDENTIFIER: com.breakfree.breakfree_flutter
          MARKETING_VERSION: '1.0.0'
          CURRENT_PROJECT_VERSION: '1'
        run: |
          cd ios/Runner
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $PRODUCT_BUNDLE_IDENTIFIER" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $CURRENT_PROJECT_VERSION" Info.plist
      
      - name: Build iOS for Simulator
        run: flutter build ios --simulator --no-codesign
      
      - name: Find iOS build output
        id: find
        run: |
          find build/ios -name "*.app" -type d | head -1
      
      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ steps.find.outputs.result }}
          retention-days: 30
